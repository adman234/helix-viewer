services:
  helix-viewer:
    image: ghcr.io/adman234/helix-viewer:latest
    container_name: helix-viewer
    ports:
      - "7860:80"
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: helix-backend
    volumes:
      - ./uploads:/uploads
    restart: unless-stopped
    environment:
      - UPLOAD_DIR=/uploads
      - PORT=3000
