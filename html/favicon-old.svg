<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Magnifying glass ring -->
  <circle cx="80" cy="80" r="62" fill="white" stroke="black" stroke-width="14"/>
  <!-- Handle -->
  <line x1="127" y1="127" x2="184" y2="184" stroke="black" stroke-width="18" stroke-linecap="round"/>
  <!-- DNA strand A (left→right→left S-curve) -->
  <path d="M57,22 C90,32 65,52 80,80 C95,108 70,128 103,138"
        fill="none" stroke="black" stroke-width="7" stroke-linecap="round"/>
  <!-- DNA strand B (mirror) -->
  <path d="M103,22 C70,32 95,52 80,80 C65,108 90,128 57,138"
        fill="none" stroke="black" stroke-width="7" stroke-linecap="round"/>
  <!-- Rungs -->
  <line x1="62" y1="30"  x2="98" y2="30"  stroke="black" stroke-width="5"/>
  <line x1="55" y1="48"  x2="105" y2="48" stroke="black" stroke-width="5"/>
  <line x1="55" y1="66"  x2="105" y2="66" stroke="black" stroke-width="5"/>
  <line x1="55" y1="94"  x2="105" y2="94" stroke="black" stroke-width="5"/>
  <line x1="55" y1="112" x2="105" y2="112" stroke="black" stroke-width="5"/>
  <line x1="55" y1="130" x2="105" y2="130" stroke="black" stroke-width="5"/>
  <line x1="62" y1="138" x2="98" y2="138" stroke="black" stroke-width="5"/>
</svg>
