server {
    listen 80;

    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        client_max_body_size 5m;
    }

    location / {
        root  /usr/share/nginx/html;
        index index.html;
    }
}
